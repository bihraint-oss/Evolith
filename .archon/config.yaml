# Evolith Project Configuration
# Codex-first workflow strategy for this repo
# All project workflows should run through Codex unless a specific exception is introduced later

assistant: codex

assistants:
  codex:
    model: gpt-5.4
    modelReasoningEffort: xhigh
  claude:
    # Routes to GLM-5.1 via Anthropic API proxy (all Claude models → GLM-5.1)
    # Used for: classification, review, validation, synthesis, reporting
    model: sonnet

defaults:
  loadDefaultCommands: true
  loadDefaultWorkflows: true
